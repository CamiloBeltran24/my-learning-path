<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>

            <tr>
                <td>Juan</td>
                <td>Perez</td>
                <td>25</td>
            </tr>

            <tr>

            <tr>
                <td>Mouse</td>

            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Total</td>
                <td>55</td>
            </tr>
        </tfoot>
    </table>

</html>

<!-- DOCTYPE indica que esto es HTML5 -->
<!DOCTYPE html>
<!-- lang indica el idioma del proyecto  -->
<html lang="en">
<head>
    <!-- Indica que vamos a utilizar caracteres especiales (acentos, etc) y emojis  -->
    <meta charset="UTF-8">
    <!-- Nos ayuda a que el consumo del proyectos desde dispositovs moviles sea mas facil, device-width usa el ancho del dispositivo, initial-scale indica sin zoom inicial  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- El titulo de la pagina en la pestaña del navegador -->
    <title>Clase 01</title>
</head>
<body>
    <h1>Titulo de mi pagina web</h1>
    <p>Este es mi primer Sitio Web</p>
</body>
</html>

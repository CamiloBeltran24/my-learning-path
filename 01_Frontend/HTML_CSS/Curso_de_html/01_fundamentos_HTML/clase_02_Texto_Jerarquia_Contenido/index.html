<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica Texto</title>
</head>
<body>
    <!-- Titulo principal de la pagina -->
    <h1>Titulo H1</h1>

    <!-- Titulo secundario de la pagina -->
    <h2>Titulo H2</h2>

    <!-- Titulo terciario de la pagina -->
    <h3>Titulo H3</h3>

    <h4>Titulo H4</h4>
    <h5>Titulo H5</h5>
    <h6>Titulo H6</h6>

    <p>Soy Texto</p>

    <p>Soy otro texto pero <strong>esto es más importante</strong></p>

    <!-- blockquote se utiliza para Citar a otra persona o información -->
    <blockquote>"Cuso de HTML"</blockquote>
</body>
</html>
